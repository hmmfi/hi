<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi - Beni Ne Kadar Tanıyorsun?</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #f8fbff, #eaf2ff);
      color: #111827;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 22px;
    }

    .top-logo {
      display: block;
      width: 135px;
      height: auto;
      margin: 8px auto 8px auto;
    }

    .subtitle {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 22px;
    }

    .card {
      background: white;
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(37, 99, 235, 0.12);
      margin-top: 20px;
      border: 1px solid #e5edff;
    }

    h1 {
      font-size: 24px;
      text-align: center;
      margin: 10px 0;
    }

    .desc {
      text-align: center;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.5;
      margin-top: 12px;
    }

    .input {
      width: 100%;
      border: 2px solid #dbeafe;
      background: #f8fbff;
      border-radius: 16px;
      padding: 15px;
      margin-top: 14px;
      font-size: 16px;
      outline: none;
    }

    .question {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .option {
      width: 100%;
      border: 2px solid #dbeafe;
      background: #f8fbff;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 12px;
      font-size: 17px;
      cursor: pointer;
      text-align: left;
    }

    .selected {
      border-color: #2563eb;
      background: #dbeafe;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb, #06b6d4);
      color: white;
    }

    .btn-green {
      background: #16a34a;
      color: white;
    }

    .btn-light {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .progress {
      text-align: center;
      color: #6b7280;
      margin-bottom: 14px;
    }

    .result-percent {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #7c3aed, #2563eb, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin: 18px 0;
    }

    .hidden {
      display: none;
    }

    .error {
      text-align: center;
      color: #dc2626;
      font-weight: 700;
    }

    .loading {
      text-align: center;
      color: #6b7280;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="container">

  <img class="top-logo" src="hi_logo_trans.png" alt="Hi Logo">
  <div class="subtitle">Beni ne kadar tanıyorsun?</div>

  <div id="loading" class="loading">Test yükleniyor...</div>

  <div id="errorBox" class="card hidden">
    <p class="error">Test bulunamadı veya pasif durumda.</p>
  </div>

  <div id="startBox" class="card hidden">
    <h1 id="testTitle"></h1>
    <p class="desc">
      Senin için hazırladığım soruları cevapla, beni ne kadar iyi tanıdığını göster.
    </p>

    <button class="btn btn-primary" onclick="showNameBox()">
      Teste Başla
    </button>
  </div>

  <div id="nameBox" class="card hidden">
    <h1>Adını yaz</h1>
    <p class="desc">İstersen ad soyad yazabilir veya bu adımı atlayabilirsin.</p>

    <input id="solverNameInput" class="input" type="text" placeholder="Ad Soyad">

    <button class="btn btn-primary" onclick="startTestWithName()">
      Devam Et
    </button>

    <button class="btn btn-light" onclick="skipName()">
      Atla
    </button>
  </div>

  <div id="quizBox" class="card hidden">
    <div id="progress" class="progress"></div>
    <div id="questionText" class="question"></div>
    <div id="optionsBox"></div>

    <button class="btn btn-primary" onclick="nextQuestion()">
      Devam Et
    </button>
  </div>

  <div id="resultBox" class="card hidden">
    <h1>Sonucun Hazır 🎉</h1>

    <div id="resultPercent" class="result-percent"></div>
    <p id="resultText" class="desc"></p>

    <button class="btn btn-green" onclick="shareResult()">
      Sonucu Arkadaşınla Paylaş
    </button>

    <button class="btn btn-primary" onclick="openApp()">
      Kendi Testini Oluştur
    </button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-s8N4pggU8UiXd6owGZYBnZlwGAPlBCI",
    authDomain: "e-okul-c3181.firebaseapp.com",
    databaseURL: "https://e-okul-c3181.firebaseio.com",
    projectId: "e-okul-c3181",
    storageBucket: "e-okul-c3181.appspot.com",
    messagingSenderId: "891894035258",
    appId: "1:891894035258:android:14cb90f58b4992f8e1d603"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let testId = null;
  let testData = null;
  let questions = [];
  let currentIndex = 0;
  let selectedIndex = -1;
  let correctCount = 0;
  let solverName = "";

  window.onload = async function () {
    const params = new URLSearchParams(window.location.search);
    testId = params.get("testId");

    if (!testId) {
      showError();
      return;
    }

    try {
      const snapshot = await get(ref(db, "tests/" + testId));

      if (!snapshot.exists()) {
        showError();
        return;
      }

      testData = snapshot.val();

      if (testData.active === false || testData.isActive === false) {
        showError();
        return;
      }

      if (Array.isArray(testData.questions)) {
        questions = testData.questions;
      } else if (testData.questions) {
        questions = Object.values(testData.questions);
      } else {
        questions = [];
      }

      if (questions.length === 0) {
        showError();
        return;
      }

      document.getElementById("loading").classList.add("hidden");
      document.getElementById("startBox").classList.remove("hidden");

      document.getElementById("testTitle").innerText =
        testData.title || "Beni Ne Kadar Tanıyorsun?";

    } catch (e) {
      showError();
    }
  };

  function showError() {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("errorBox").classList.remove("hidden");
  }

  window.showNameBox = function () {
    document.getElementById("startBox").classList.add("hidden");
    document.getElementById("nameBox").classList.remove("hidden");
  };

  window.startTestWithName = function () {
    solverName = document.getElementById("solverNameInput").value.trim();
    startTest();
  };

  window.skipName = function () {
    solverName = "";
    startTest();
  };

  function startTest() {
    currentIndex = 0;
    selectedIndex = -1;
    correctCount = 0;

    document.getElementById("nameBox").classList.add("hidden");
    document.getElementById("quizBox").classList.remove("hidden");
    document.getElementById("resultBox").classList.add("hidden");

    showQuestion();
  }

  function showQuestion() {
    selectedIndex = -1;

    const q = questions[currentIndex];

    document.getElementById("progress").innerText =
      (currentIndex + 1) + " / " + questions.length;

    document.getElementById("questionText").innerText =
      q.question || q.questionText || q.text || "Soru";

    const optionsBox = document.getElementById("optionsBox");
    optionsBox.innerHTML = "";

    const options = getOptions(q);

    options.forEach((option, index) => {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.innerText = String.fromCharCode(65 + index) + ") " + getOptionText(option);

      btn.onclick = function () {
        selectedIndex = index;

        document.querySelectorAll(".option").forEach(el => {
          el.classList.remove("selected");
        });

        btn.classList.add("selected");
      };

      optionsBox.appendChild(btn);
    });
  }

  window.nextQuestion = function () {
    if (selectedIndex === -1) {
      alert("Lütfen bir cevap seç.");
      return;
    }

    const q = questions[currentIndex];

    const correctIndex =
      typeof q.correctIndex === "number"
        ? q.correctIndex
        : parseInt(q.correctIndex || "0");

    if (selectedIndex === correctIndex) {
      correctCount++;
    }

    currentIndex++;

    if (currentIndex < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  };

  function showResult() {
    document.getElementById("quizBox").classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    const percent = Math.round((correctCount / questions.length) * 100);

    document.getElementById("resultPercent").innerText = "%" + percent;

    document.getElementById("resultText").innerText =
      "Arkadaşını %" + percent + " tanıyorsun.";
  }

  window.shareResult = function () {
    const percent = Math.round((correctCount / questions.length) * 100);

    let message = "";

    if (solverName.length > 0) {
      message += solverName + " sonucu:\n";
    }

    message +=
      "🔥 Seni %" + percent + " tanıyorum!"
    ;

    window.open("https://wa.me/?text=" + encodeURIComponent(message), "_blank");
  };

  window.openApp = function () {
    window.location.href =
      "https://play.google.com/store/apps/details?id=com.hmmfi.hi";
  };

  function getOptions(q) {
    if (Array.isArray(q.options)) {
      return q.options;
    }

    if (q.options) {
      return Object.values(q.options);
    }

    return [];
  }

  function getOptionText(option) {
    if (typeof option === "string") {
      return option;
    }

    if (option && option.text) {
      return option.text;
    }

    return "";
  }
</script>

</body>
</html>
